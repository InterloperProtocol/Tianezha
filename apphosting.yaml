runConfig:
  minInstances: 0

env:
  - variable: ALLOW_IN_PROCESS_WORKER
    value: "true"
    availability:
      - RUNTIME

  - variable: AGENT_MODEL_PROVIDER
    value: "vertex-ai-gemini"
    availability:
      - RUNTIME

  - variable: GOOGLE_GENAI_USE_VERTEXAI
    value: "true"
    availability:
      - RUNTIME

  - variable: VERTEX_AI_PROJECT_ID
    value: "goonclaw-app"
    availability:
      - RUNTIME

  - variable: VERTEX_AI_LOCATION
    value: "global"
    availability:
      - RUNTIME

  - variable: VERTEX_AI_MODEL
    value: "gemini-2.5-flash"
    availability:
      - RUNTIME

  - variable: TREASURY_WALLET
    value: "784GuK5UrT9KsTvUexXmq1G9pLgckUFscth5DEwQGVbZ"
    availability:
      - RUNTIME

  - variable: PAYLOAD_SECRET
    secret: PAYLOAD_SECRET

  - variable: APP_SESSION_SECRET
    secret: goonclaw-app-session-secret

  - variable: DEVICE_CREDENTIALS_AES_KEY
    secret: goonclaw-device-credentials-aes-key

  - variable: WORKER_TOKEN
    secret: goonclaw-worker-token
